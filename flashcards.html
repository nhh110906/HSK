<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcard — Ôn Tiếng Trung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=7" />
</head>
<body>
  <div class="app app-study">
    <header class="study-header">
      <a href="#" class="back-link" id="backLink">← Ôn tập</a>
      <span class="study-badge" id="levelBadge"></span>
      <span class="progress-text" id="progressText"></span>
    </header>

    <main class="flashcard-main">
      <div class="card-scene">
        <div class="flashcard flashcard-tall" id="flashcard" tabindex="0" role="button" aria-label="Lật thẻ">
          <div class="flashcard-face flashcard-front">
            <span class="card-label">Hán tự</span>
            <p class="card-hanzi" id="cardHanzi"></p>
            <p class="flip-hint flip-hint-front">Chạm để lật → xem pinyin, nghĩa &amp; ví dụ</p>
          </div>
          <div class="flashcard-face flashcard-back">
            <div class="card-back-scroll">
              <span class="card-label">Pinyin từ</span>
              <p class="card-pinyin" id="cardPinyin"></p>
              <span class="card-label">Nghĩa từ</span>
              <p class="card-meaning" id="cardMeaning"></p>

              <div class="card-example-block" id="cardExampleBlock">
                <hr class="card-divider" />
                <span class="card-label">Câu ví dụ</span>
                <p class="card-ex-zh" id="refExample"></p>
                <div class="example-meaning-box example-meaning-compact">
                  <p class="example-vi-label">Nghĩa ví dụ</p>
                  <p class="example-vi" id="refVi"></p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="example-pinyin-box is-collapsed" id="pinyinPanel">
        <p class="example-py-label">Pinyin câu ví dụ</p>
        <p class="example-py" id="refPinyin"></p>
      </div>

      <p class="flip-hint">Space hoặc chạm thẻ để lật</p>

      <div class="study-controls">
        <button type="button" class="btn btn-ghost" id="btnPrev">← Trước</button>
        <button type="button" class="btn btn-primary" id="btnShuffle">Trộn</button>
        <button type="button" class="btn btn-danger" id="btnTogglePinyin" aria-expanded="false">Pinyin</button>
        <button type="button" class="btn btn-ghost" id="btnNext">Sau →</button>
      </div>
    </main>
  </div>
  <script src="js/config.js?v=9"></script>
  <script src="js/data.js?v=9"></script>
  <script src="js/flashcards.js?v=9"></script>
</body>
</html>
