<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ôn Tiếng Trung — Chọn bộ từ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=10" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-hanzi">学</span>
        <div>
          <h1>Ôn Tiếng Trung</h1>
          <p>Chọn bộ từ vựng HSK</p>
        </div>
      </div>
    </header>

    <main class="home">
      <section class="nav-step" id="stepVersion">
        <h2>Chọn bộ từ vựng</h2>
        <div class="version-grid">
          <a class="version-card version-card-2" id="pickV2" href="#">
            <span class="version-tag">HSK 2.0</span>
            <h3>Từ vựng 2.0</h3>
            <p>Thanh Mai HSK · HSK 1–4 kèm ví dụ câu</p>
          </a>
          <a class="version-card version-card-3" id="pickV3" href="#">
            <span class="version-tag">HSK 3.0</span>
            <h3>Từ vựng 3.0</h3>
            <p>PDF chuẩn HSK 3.0 · đầy đủ từ HSK 1–4</p>
          </a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>跟辉煌练习汉语 - cài đặt API</p>
    </footer>
  </div>

  <script src="js/config.js?v=10"></script>
  <script src="js/start.js?v=10"></script>
</body>
</html>
